name: PHPUnit Reusable

on:
  workflow_call:
    inputs:
      os:
        required: true
        type: string
      php:
        required: true
        type: string
      db-type:
        required: true
        type: string
      db-version:
        required: true
        type: string
      multisite:
        required: true
        type: boolean
      memcached:
        required: true
        type: boolean
      coverage:
        required: true
        type: string
      experimental:
        required: true
        type: boolean

jobs:
  test-php:
    name: "${{ inputs.multisite && 'Multisite on' || '' }} ${{ 'mariadb' == inputs.db-type && 'MariaDB' || 'MySQL' }} ${{ inputs.db-version }}${{ inputs.memcached && ' memcached' || '' }}${{ 'xdebug' == inputs.coverage && ' with XDebug' || '' }}${{ inputs.experimental && ' - Experimental' || '' }}"
    runs-on: ${{ inputs.os }}
    permissions:
      contents: read

    # Runs the PHPUnit tests for ClassicPress.
    #
    # Performs the following steps:
    # - Set environment variables.
    # - Install libheif-plugin-aomenc and ghostscript.
    # - Checkout ClassicPress.
    # - Read .nvmrc.
    # - Installs NodeJS.
    # - Sets up caching for NPM.
    # - Login at Docker Hub to increase access limits
    # - Setup, wait for and initialise Database.
    # - Installs NPM dependencies using install-changed to hash the `package.json` file.
    # - Configure PHP.
    # - Set up locale.
    # - Install PHPUnit and Composer dependencies.
    # - Make Composer packages available globally.
    # - Log debug information.
    # - Create config file.
    # - Set up object cache if needed for memcached tests.
    # - Set up a Memcached server if needed.
    # - Clone PHP.net if needed for unit tests.
    # - Run PHPUnit Tests.
    steps:
      - name: Configure environment variables
        run: |
          echo "PHP_FPM_UID=$(id -u)" >> $GITHUB_ENV
          echo "PHP_FPM_GID=$(id -g)" >> $GITHUB_ENV

      - name: Install apt packages
        uses: immoseb/cache-apt-pkgs-action-fork@issue-191-bump-off-of-node-20-actions
        # Awaiting update to awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libheif-plugin-aomenc ghostscript

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Read .nvmrc
        run: echo "NVMRC=$(cat .nvmrc)" >> $GITHUB_OUTPUT
        id: nvmrc

      - name: Install NodeJS
        uses: actions/setup-node@v6
        with:
          node-version: '${{ steps.nvmrc.outputs.NVMRC }}'

      - name: Use cached Node modules
        uses: actions/cache@v5
        env:
          cache-name: cache-node-modules
        with:
          # npm cache files are stored in `~/.npm` on Linux/macOS
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Login to Docker Hub
        if: ${{ github.event_name != 'pull_request' || ( github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false ) }}
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup Database
        uses: shogo82148/actions-setup-mysql@v1
        with:
          root-password: "password"
          mysql-version: "${{ inputs.db-type }}-${{ inputs.db-version }}"

      - name: Wait for MySQL
        if: ${{ inputs.db-type == 'mysql' }}
        run: |
          while ! mysqladmin ping --host=127.0.0.1 --port 3306 -u root -ppassword --silent; do
            sleep 1
          done

      - name: Initialise MySQL
        if: ${{ inputs.db-type == 'mysql' }}
        run: |
          mysql --host 127.0.0.1 --port 3306 -u root -ppassword -e "SELECT @@VERSION"
          mysql --host 127.0.0.1 --port 3306 -u root -ppassword < tools/local-env/mysql-init.sql
          mysql --host 127.0.0.1 --port 3306 -u root -ppassword -e "SHOW DATABASES"

      - name: Wait for MariaDB
        if: ${{ inputs.db-type == 'mariadb' }}
        run: |
          while ! mariadb-admin ping --host=127.0.0.1 --port 3306 -u root -ppassword --silent; do
            sleep 1
          done

      - name: Initialise MariaDB
        if: ${{ inputs.db-type == 'mariadb' }}
        run: |
          mariadb --host 127.0.0.1 --port 3306 -u root -ppassword -e "SELECT @@VERSION"
          mariadb --host 127.0.0.1 --port 3306 -u root -ppassword < tools/local-env/mysql-init.sql
          mariadb --host 127.0.0.1 --port 3306 -u root -ppassword -e "SHOW DATABASES"

      - name: Install dependencies
        run: npx install-changed --install-command="npm ci"

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "${{ inputs.php }}"
          ini-values: >-
            mysql.default_host=127.0.0.1,
            mysql.default_port=3306,
            mysql.default_socket=/var/run/mysqld/mysqld.sock
          extensions: >-
            bcmath,
            curl,
            dom,
            exif,
            gd,
            iconv,
            imagick,
            intl,
            libxml,
            mbstring,
            memcached,
            mysql,
            mysqli,
            pcntl,
            pdo,
            pdo_mysql,
            pdo_sqlite,
            soap,
            sqlite,
            zip
          coverage: "${{ inputs.coverage }}"

      - name: Set up locale
        run: |
          sudo locale-gen es_ES.UTF-8 fr_FR.UTF-8 ru_RU.UTF-8
          sudo update-locale LC_ALL="es_ES.UTF-8 fr_FR.UTF-8 ru_RU.UTF-8"

      - name: Install Composer dependencies
        uses: ramsey/composer-install@v4
        with:
          composer-options: "--no-progress --no-ansi --no-interaction"

      - name: Make Composer packages available globally
        run: echo "${PWD}/vendor/bin" >> $GITHUB_PATH

      - name: Show debug information
        run: |
          set +e
          set -x
          npm --version
          node --version
          curl --version
          git --version
          svn --version
          php --version
          phpunit --version
          composer --version
          grunt --version
          lsb_release -a
          localectl list-locales

      - name: Create ClassicPress config file for tests
        run: |
          cp wp-tests-config-sample.php wp-tests-config.php
          sed -i 's/youremptytestdbnamehere/classicpress_develop_tests/g' wp-tests-config.php
          sed -i 's/yourusernamehere/root/g' wp-tests-config.php
          sed -i 's/yourpasswordhere/password/g' wp-tests-config.php
          sed -i 's/localhost/127.0.0.1/g' wp-tests-config.php

      - name: Set up object cache
        if: ${{ inputs.memcached }}
        run: |
          cp tests/phpunit/includes/object-cache.php src/wp-content/object-cache.php

      - name: Set up a Memcached server
        if: ${{ inputs.memcached }}
        uses: niden/actions-memcached@v8

      - name: Run PHPUnit default
        if: ${{ !inputs.multisite }}
        env:
          WP_DB_HOST: 127.0.0.1:3306
        run: grunt phpunit:default
        continue-on-error: ${{ inputs.experimental }}

      - name: Run PHPUnit ajax
        env:
          WP_DB_HOST: 127.0.0.1:3306
        run: grunt phpunit:ajax
        continue-on-error: ${{ inputs.experimental }}

      - name: Run PHPUnit multisite
        if: ${{ inputs.multisite }}
        env:
          WP_DB_HOST: 127.0.0.1:3306
        run: grunt phpunit:multisite
        continue-on-error: ${{ inputs.experimental }}

      - name: Run PHPUnit ms-files
        env:
          WP_DB_HOST: 127.0.0.1:3306
        run: grunt phpunit:ms-files
        continue-on-error: ${{ inputs.experimental }}

      - name: Run PHPUnit external-http
        if: ${{ inputs.coverage != 'none' }}
        env:
          WP_DB_HOST: 127.0.0.1:3306
        run: grunt phpunit:external-http
        continue-on-error: ${{ inputs.experimental }}

      - name: Run PHPUnit restapi-jsclient
        env:
          WP_DB_HOST: 127.0.0.1:3306
        run: grunt phpunit:restapi-jsclient
        continue-on-error: ${{ inputs.experimental }}

      - name: Run PHPUnit wp-api-client-fixtures
        env:
          WP_DB_HOST: 127.0.0.1:3306
        run: grunt phpunit:wp-api-client-fixtures
        continue-on-error: ${{ inputs.experimental }}
